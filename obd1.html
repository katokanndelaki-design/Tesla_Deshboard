<!DOCTYPE html>
<html lang="ka">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Tesla Plaid - Digital Cluster</title>
    
    <!-- Firebase SDK -->
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
    
    <!-- Premium Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@500;700&family=Orbitron:wght@700;900&display=swap" rel="stylesheet">

    <style>
        :root {
            --bg: #000000;
            --text-main: #ffffff;
            --text-muted: #444444;
            --cyan: #00f0ff;
            --green: #00ffaa;
            --orange: #ff9f43;
            --red: #ff4757;
            --yellow: #ffd32a;
            --font-tech: 'Rajdhani', sans-serif;
            --font-speed: 'Orbitron', sans-serif;
        }

        * { box-sizing: border-box; user-select: none; }

        body {
            font-family: var(--font-tech);
            background-color: var(--bg);
            color: var(--text-main);
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            overflow: hidden;
        }

        /* --- Status Bar --- */
        .status-bar {
            position: absolute;
            top: 20px;
            display: flex;
            gap: 20px;
            font-weight: 700;
            letter-spacing: 2px;
            font-size: 11px;
            z-index: 10;
        }
        .status-item {
            padding: 4px 12px;
            border-radius: 20px;
            background: rgba(255,255,255,0.03);
            border: 1px solid #222;
            transition: 0.3s;
            display: flex;
            align-items: center;
            gap: 6px;
        }

        /* --- Cluster 3-Column Layout --- */
        .cluster-container {
            display: flex;
            justify-content: center;
            align-items: flex-start;
            gap: 60px;
            width: 100%;
            max-width: 1200px;
            margin-top: 40px;
        }

        /* --- Gauge Blocks --- */
        .gauge-block {
            display: flex;
            flex-direction: column;
            align-items: center;
            position: relative;
        }

        .svg-container {
            position: relative;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .svg-container svg {
            transform: rotate(-90deg); /* რკალის დაწყება ზემოდან */
            filter: drop-shadow(0 0 10px rgba(255,255,255,0.05));
        }

        .circle-bg {
            fill: none;
            stroke: #111;
            stroke-width: 6;
        }

        .circle-bar {
            fill: none;
            stroke-width: 8;
            stroke-linecap: round;
            transition: stroke-dashoffset 0.4s cubic-bezier(0.4, 0.0, 0.2, 1);
        }

        /* --- Inner Content for Gauges --- */
        .gauge-inner {
            position: absolute;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-align: center;
        }

        .label {
            font-size: 12px;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 3px;
            margin-top: 5px;
            font-weight: 700;
        }

        /* --- Speed & PRND --- */
        .speed-val {
            font-family: var(--font-speed);
            font-size: 82px;
            color: var(--text-main);
            text-shadow: 0 0 25px rgba(0, 240, 255, 0.6);
            line-height: 1;
            margin-bottom: -5px;
        }
        .speed-unit { font-size: 14px; color: var(--cyan); letter-spacing: 2px; font-weight: 700; }
        
        .prnd {
            margin-top: 15px;
            font-size: 20px;
            font-weight: 700;
            color: #333;
            letter-spacing: 12px;
            padding-left: 12px; 
            font-family: var(--font-speed);
        }
        .prnd span.active { color: var(--text-main); text-shadow: 0 0 15px #fff; }

        /* --- Side Gauges --- */
        .side-val {
            font-family: var(--font-speed);
            font-size: 48px;
            line-height: 1;
        }
        .sub-val {
            font-size: 16px;
            font-weight: 700;
            margin-top: 5px;
            color: #888;
        }

        /* --- Controls Box (Absolute positioning relative to block) --- */
        .controls-box {
            margin-top: 30px;
            display: flex;
            gap: 15px;
            justify-content: center;
            align-items: center;
        }

        /* --- Round UI Buttons --- */
        .btn-circle {
            width: 50px;
            height: 50px;
            border-radius: 50%;
            border: 1px solid #222;
            background: rgba(255, 255, 255, 0.02);
            color: #888;
            font-size: 20px;
            cursor: pointer;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            transition: 0.2s cubic-bezier(0.4, 0.0, 0.2, 1);
            backdrop-filter: blur(5px);
        }
        .btn-circle:hover { background: rgba(255, 255, 255, 0.05); color: #fff; }
        .btn-circle:active { transform: scale(0.9); }
        
        .btn-active-pwr { color: var(--green); border-color: var(--green); box-shadow: 0 0 15px rgba(0,255,170,0.15); }

        /* --- Seat Heaters --- */
        .btn-seat { position: relative; font-weight: 700; }
        .btn-seat svg { width: 22px; height: 22px; margin-bottom: 2px;}
        .btn-seat .lvl { font-size: 10px; position: absolute; bottom: 6px; }

        .heat-1 { color: var(--yellow); border-color: var(--yellow); box-shadow: 0 0 15px rgba(255,211,42,0.15); }
        .heat-2 { color: var(--orange); border-color: var(--orange); box-shadow: 0 0 15px rgba(255,159,67,0.15); }
        .heat-3 { color: var(--red); border-color: var(--red); box-shadow: 0 0 15px rgba(255,71,87,0.15); }

        /* --- Smart Padlock Button --- */
        .btn-lock {
            width: 60px;
            height: 60px;
            border-radius: 50%;
            border: 1px solid #333;
            background: rgba(255, 255, 255, 0.02);
            cursor: pointer;
            display: flex;
            justify-content: center;
            align-items: center;
            transition: 0.3s;
        }
        .btn-lock svg { width: 24px; height: 24px; transition: 0.3s; }
        .btn-lock:active { transform: scale(0.9); }

        .lock-closed { color: #666; border-color: #222; }
        .lock-open { color: var(--red); border-color: var(--red); box-shadow: 0 0 20px rgba(255,71,87,0.2); }

    </style>
</head>
<body>

    <!-- Status Indicators -->
    <div class="status-bar">
        <div id="ws-status" class="status-item" style="color: var(--red); border-color: var(--red);">
            <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3"><path d="M5 12.55a11 11 0 0 1 14.08 0"></path><path d="M1.42 9a16 16 0 0 1 21.16 0"></path><path d="M8.53 16.11a6 6 0 0 1 6.95 0"></path><line x1="12" y1="20" x2="12.01" y2="20"></line></svg>
            WS OFF
        </div>
        <div id="obd-status" class="status-item" style="color: var(--orange); border-color: var(--orange);">
            <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3"><rect x="4" y="4" width="16" height="16" rx="2" ry="2"></rect><rect x="9" y="9" width="6" height="6"></rect><line x1="9" y1="1" x2="9" y2="4"></line><line x1="15" y1="1" x2="15" y2="4"></line><line x1="9" y1="20" x2="9" y2="23"></line><line x1="15" y1="20" x2="15" y2="23"></line><line x1="20" y1="9" x2="23" y2="9"></line><line x1="20" y1="14" x2="23" y2="14"></line><line x1="1" y1="9" x2="4" y2="9"></line><line x1="1" y1="14" x2="4" y2="14"></line></svg>
            OBD WAIT
        </div>
    </div>

    <div class="cluster-container">
        
        <!-- LEFT: Energy & Seats -->
        <div class="gauge-block">
            <div class="svg-container">
                <svg width="240" height="240">
                    <circle class="circle-bg" cx="120" cy="120" r="105" stroke-dasharray="659" stroke-dashoffset="164"></circle>
                    <circle class="circle-bar" cx="120" cy="120" r="105" stroke-dasharray="659" stroke-dashoffset="659" stroke="var(--green)" id="soc-arc" style="filter: drop-shadow(0 0 10px rgba(0,255,170,0.4));"></circle>
                </svg>
                <div class="gauge-inner">
                    <div class="side-val" id="v-soc" style="color: var(--green);">0<span style="font-size: 24px;">%</span></div>
                    <div class="label">ENERGY</div>
                    <div class="sub-val" id="v-volt">0.0 V</div>
                </div>
            </div>
            
            <!-- Dual Seat Controls -->
            <div class="controls-box">
                <button id="btn-seat-L" class="btn-circle btn-seat" onclick="toggleSeat('L')">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M5 18v-6a6 6 0 0 1 6-6h2a6 6 0 0 1 6 6v6"></path><path d="M5 18h14"></path><path d="M8 22v-4"></path><path d="M16 22v-4"></path></svg>
                    <span class="lvl" id="lbl-seat-L">L</span>
                </button>
                <button id="btn-seat-R" class="btn-circle btn-seat" onclick="toggleSeat('R')">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M5 18v-6a6 6 0 0 1 6-6h2a6 6 0 0 1 6 6v6"></path><path d="M5 18h14"></path><path d="M8 22v-4"></path><path d="M16 22v-4"></path></svg>
                    <span class="lvl" id="lbl-seat-R">R</span>
                </button>
            </div>
        </div>

        <!-- CENTER: Velocity & Lock -->
        <div class="gauge-block" style="margin-top: -30px;">
            <div class="svg-container">
                <svg width="340" height="340">
                    <circle class="circle-bg" cx="170" cy="170" r="150" stroke-dasharray="942" stroke-dashoffset="235"></circle>
                    <circle class="circle-bar" cx="170" cy="170" r="150" stroke-dasharray="942" stroke-dashoffset="942" stroke="var(--cyan)" id="speed-arc" style="stroke-width: 10px; filter: drop-shadow(0 0 15px rgba(0,240,255,0.4));"></circle>
                </svg>
                <div class="gauge-inner">
                    <div class="speed-unit">KM/H</div>
                    <div class="speed-val" id="v-speed">0</div>
                    <div class="prnd" id="v-gear">
                        <span id="g-p" class="active">P</span>
                        <span id="g-r">R</span>
                        <span id="g-n">N</span>
                        <span id="g-d">D</span>
                    </div>
                </div>
            </div>

            <!-- Smart Padlock Control -->
            <div class="controls-box" style="margin-top: 40px;">
                <button id="smart-door-btn" class="btn-lock lock-closed" onclick="toggleDoors()">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <rect x="3" y="11" width="18" height="11" rx="2" ry="2"></rect>
                        <path d="M7 11V7a5 5 0 0 1 10 0v4"></path>
                    </svg>
                </button>
            </div>
        </div>

        <!-- RIGHT: Climate & Temp Controls -->
        <div class="gauge-block">
            <div class="svg-container">
                <svg width="240" height="240">
                    <circle class="circle-bg" cx="120" cy="120" r="105" stroke-dasharray="659" stroke-dashoffset="164"></circle>
                    <circle class="circle-bar" cx="120" cy="120" r="105" stroke-dasharray="659" stroke-dashoffset="659" stroke="var(--orange)" id="climate-arc" style="filter: drop-shadow(0 0 10px rgba(255,159,67,0.4));"></circle>
                </svg>
                <div class="gauge-inner">
                    <div class="side-val" id="v-climate" style="color: var(--orange);">--</div>
                    <div class="label">CLIMATE</div>
                </div>
            </div>

            <!-- Climate Controls -->
            <div class="controls-box">
                <button class="btn-circle" onclick="adjustClimate(-0.5)">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="5" y1="12" x2="19" y2="12"></line></svg>
                </button>
                <button id="btn-clim-pwr" class="btn-circle" onclick="toggleClimatePwr()">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M18.36 6.64a9 9 0 1 1-12.73 0"></path><line x1="12" y1="2" x2="12" y2="12"></line></svg>
                </button>
                <button class="btn-circle" onclick="adjustClimate(0.5)">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="12" y1="5" x2="12" y2="19"></line><line x1="5" y1="12" x2="19" y2="12"></line></svg>
                </button>
            </div>
        </div>

    </div>

    <script>
        // --- Firebase Config ---
        const ESP_IP = "192.168.43.150"; 
        const VIN_PATH = "/5YJYGDEF1LF009721";
        
        const fbConfig = {
            apiKey: "AIzaSyAH3yVbBGrhvzbSx7J1GxNcVsl_ykX_OX0",
            databaseURL: "https://tesla-telemetry-29fb6-default-rtdb.europe-west1.firebasedatabase.app"
        };
        firebase.initializeApp(fbConfig);
        const db = firebase.database();

        let socket;
        let isWsActive = false;
        
        // --- State Variables ---
        let currentClimate = 21.0;
        let isClimateOn = false;
        let climateLock = null; // UI Feedback lock
        
        let areDoorsOpen = false;
        
        // Seats
        let seatL = 0;
        let seatR = 0;
        let seatLock = null;

        // --- Core Arc Animation ---
        function setArc(id, value, max, circumference, offsetCorrection) {
            const circle = document.getElementById(id);
            if(!circle) return;
            // 75% fill for 270 degree arc
            const fillAmount = Math.min(Math.max(value / max, 0), 1) * 0.75; 
            const offset = circumference - (fillAmount * circumference) + offsetCorrection;
            circle.style.strokeDashoffset = offset;
        }

        // --- Command Sender (TTL) ---
        function sendCmd(id, hexData) {
            const unixTime = Math.floor(Date.now() / 1000);
            db.ref(VIN_PATH + '/command').set(`${id}|${hexData}|${unixTime}`);
        }

        // --- Update Display from Stream ---
        function updateDisplay(data) {
            // Speed (Arc Max 160)
            if (data.speed !== undefined) {
                document.getElementById('v-speed').innerText = data.speed;
                setArc('speed-arc', data.speed, 160, 942, 117); 
            }

            // SOC & Volt
            if (data.soc !== undefined) {
                document.getElementById('v-soc').innerHTML = `${data.soc.toFixed(0)}<span style="font-size:24px">%</span>`;
                setArc('soc-arc', data.soc, 100, 659, 82);
            }
            if (data.volt !== undefined) {
                document.getElementById('v-volt').innerText = `${data.volt.toFixed(1)} V`;
            }

            // PRND
            if (data.gear) {
                document.querySelectorAll('.prnd span').forEach(el => el.classList.remove('active'));
                const gEl = document.getElementById(`g-${data.gear.toLowerCase()}`);
                if(gEl) gEl.classList.add('active');
            }

            // Climate Update (Only if not manually adjusting)
            if (data.climate && !climateLock) {
                let climRaw = data.climate.replace("141 ", "").trim();
                if(climRaw) {
                    if (climRaw === "OFF") {
                        isClimateOn = false;
                        document.getElementById('v-climate').innerText = "OFF";
                        document.getElementById('btn-clim-pwr').className = "btn-circle";
                        document.getElementById('climate-arc').style.strokeDashoffset = 659;
                    } else if (!isNaN(parseFloat(climRaw))) {
                        isClimateOn = true;
                        currentClimate = parseFloat(climRaw);
                        document.getElementById('v-climate').innerText = `${currentClimate.toFixed(1)}°`;
                        document.getElementById('btn-clim-pwr').className = "btn-circle btn-active-pwr";
                        setArc('climate-arc', currentClimate - 15, 15, 659, 82);
                    }
                }
            }

            // Doors Lock/Unlock Status
            if (data.doors) {
                let doorRaw = data.doors.replace("0DA ", "").trim();
                // Simulating lock state logic
                areDoorsOpen = (doorRaw !== "" && doorRaw !== "00 00 00 00 00 00 00 00");
                updateSmartButtonUI();
            }

            // Global Status
            const obdEl = document.getElementById('obd-status');
            if (data.obd) {
                obdEl.innerHTML = `<svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3"><rect x="4" y="4" width="16" height="16" rx="2" ry="2"></rect><rect x="9" y="9" width="6" height="6"></rect><line x1="9" y1="1" x2="9" y2="4"></line><line x1="15" y1="1" x2="15" y2="4"></line><line x1="9" y1="20" x2="9" y2="23"></line><line x1="15" y1="20" x2="15" y2="23"></line><line x1="20" y1="9" x2="23" y2="9"></line><line x1="20" y1="14" x2="23" y2="14"></line><line x1="1" y1="9" x2="4" y2="9"></line><line x1="1" y1="14" x2="4" y2="14"></line></svg> OBD LIVE`;
                obdEl.style.color = "var(--green)"; obdEl.style.borderColor = "var(--green)";
            } else {
                obdEl.innerHTML = `<svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3"><rect x="4" y="4" width="16" height="16" rx="2" ry="2"></rect><rect x="9" y="9" width="6" height="6"></rect><line x1="9" y1="1" x2="9" y2="4"></line><line x1="15" y1="1" x2="15" y2="4"></line><line x1="9" y1="20" x2="9" y2="23"></line><line x1="15" y1="20" x2="15" y2="23"></line><line x1="20" y1="9" x2="23" y2="9"></line><line x1="20" y1="14" x2="23" y2="14"></line><line x1="1" y1="9" x2="4" y2="9"></line><line x1="1" y1="14" x2="4" y2="14"></line></svg> OBD OFF`;
                obdEl.style.color = "var(--text-muted)"; obdEl.style.borderColor = "#222";
            }
        }

        // --- INTERACTIVE CONTROLS ---

        // 1. Padlock (Smart Door)
        function updateSmartButtonUI() {
            const btn = document.getElementById('smart-door-btn');
            if(areDoorsOpen) {
                btn.className = "btn-lock lock-open";
                // Unlocked Icon
                btn.innerHTML = `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="11" width="18" height="11" rx="2" ry="2"></rect><path d="M7 11V7a5 5 0 0 1 9.9-1"></path></svg>`;
            } else {
                btn.className = "btn-lock lock-closed";
                // Locked Icon
                btn.innerHTML = `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="11" width="18" height="11" rx="2" ry="2"></rect><path d="M7 11V7a5 5 0 0 1 10 0v4"></path></svg>`;
            }
        }

        window.toggleDoors = function() {
            let hexCmd = areDoorsOpen ? "01 00 00 00 00 00 00 00" : "02 00 00 00 00 00 00 00";
            areDoorsOpen = !areDoorsOpen; 
            updateSmartButtonUI();
            sendCmd('0DA', hexCmd);
        };

        // 2. Climate (+ / - Auto Power On)
        window.adjustClimate = function(delta) {
            if(!isClimateOn) {
                isClimateOn = true;
                document.getElementById('btn-clim-pwr').className = "btn-circle btn-active-pwr";
            }
            
            currentClimate += delta;
            if(currentClimate < 15) currentClimate = 15;
            if(currentClimate > 30) currentClimate = 30;
            
            document.getElementById('v-climate').innerText = `${currentClimate.toFixed(1)}°`;
            setArc('climate-arc', currentClimate - 15, 15, 659, 82);

            clearTimeout(climateLock);
            climateLock = setTimeout(() => { climateLock = null; }, 3000);
            sendCmd('141', `SET ${currentClimate.toFixed(1)}`);
        };

        window.toggleClimatePwr = function() {
            isClimateOn = !isClimateOn;
            const btn = document.getElementById('btn-clim-pwr');
            const arc = document.getElementById('climate-arc');
            
            if(isClimateOn) {
                btn.className = "btn-circle btn-active-pwr";
                document.getElementById('v-climate').innerText = `${currentClimate.toFixed(1)}°`;
                setArc('climate-arc', currentClimate - 15, 15, 659, 82);
                sendCmd('141', 'ON');
            } else {
                btn.className = "btn-circle";
                document.getElementById('v-climate').innerText = "OFF";
                arc.style.strokeDashoffset = 659; // Hide arc
                sendCmd('141', 'OFF');
            }
        };

        // 3. Seat Heaters (Driver & Passenger)
        window.toggleSeat = function(side) {
            if(side === 'L') {
                seatL = (seatL + 1) % 4; // 0, 1, 2, 3
                updateSeatUI('L', seatL);
            } else {
                seatR = (seatR + 1) % 4;
                updateSeatUI('R', seatR);
            }
            
            clearTimeout(seatLock);
            seatLock = setTimeout(() => { seatLock = null; }, 3000);
            // Simulated format for Dual Seats
            sendCmd('338', `0${seatL} 0${seatR} 00 00 00 00 00 00`); 
        };

        function updateSeatUI(side, level) {
            const btn = document.getElementById('btn-seat-' + side);
            btn.className = "btn-circle btn-seat " + (level > 0 ? `heat-${level}` : "");
            btn.querySelector('.lvl').innerText = level > 0 ? level : side;
        }

        // --- Network Handlers ---
        function initWS() {
            if (window.location.protocol === 'https:') return; 
            try {
                socket = new WebSocket(`ws://${ESP_IP}:81/`);
                socket.onopen = () => {
                    isWsActive = true;
                    const el = document.getElementById('ws-status');
                    el.innerHTML = `<svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3"><path d="M5 12.55a11 11 0 0 1 14.08 0"></path><path d="M1.42 9a16 16 0 0 1 21.16 0"></path><path d="M8.53 16.11a6 6 0 0 1 6.95 0"></path><line x1="12" y1="20" x2="12.01" y2="20"></line></svg> WS LIVE`;
                    el.style.color = "var(--green)"; el.style.borderColor = "var(--green)";
                };
                socket.onmessage = (e) => {
                    try { updateDisplay(JSON.parse(e.data)); } catch (err) {}
                };
                socket.onclose = () => {
                    isWsActive = false;
                    const el = document.getElementById('ws-status');
                    el.innerHTML = `<svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3"><path d="M5 12.55a11 11 0 0 1 14.08 0"></path><path d="M1.42 9a16 16 0 0 1 21.16 0"></path><path d="M8.53 16.11a6 6 0 0 1 6.95 0"></path><line x1="12" y1="20" x2="12.01" y2="20"></line></svg> WS OFF`;
                    el.style.color = "var(--text-muted)"; el.style.borderColor = "#222";
                    setTimeout(initWS, 5000);
                };
            } catch(e) {}
        }

        db.ref(VIN_PATH + '/telemetry').on('value', (snap) => {
            if (!isWsActive && snap.val()) updateDisplay(snap.val());
        });

        // Initialize
        initWS();
        updateSmartButtonUI();
    </script>
</body>
