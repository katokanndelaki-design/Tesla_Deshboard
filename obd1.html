<!DOCTYPE html>
<html lang="ka">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Tesla Cyber Cockpit v3.0</title>
    
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Rajdhani:wght@300;500;700&display=swap');

        :root {
            --tesla-cyan: #00f2ff;
            --tesla-red: #ff0044;
            --tesla-gold: #ffcc00;
            --bg-dark: #05070a;
            --glass: rgba(255, 255, 255, 0.03);
            --glow-cyan: 0 0 15px rgba(0, 242, 255, 0.5);
        }

        body { 
            background-color: var(--bg-dark);
            color: #ffffff;
            font-family: 'Rajdhani', sans-serif;
            margin: 0;
            overflow: hidden;
            height: 100vh;
            background: radial-gradient(circle at center, #0d1625 0%, #05070a 100%);
        }

        .dashboard-container {
            display: grid;
            grid-template-columns: 1fr 1.5fr 1fr;
            height: 100vh;
            padding: 20px;
            gap: 20px;
            align-items: center;
        }

        .side-panel {
            display: flex;
            flex-direction: column;
            gap: 20px;
            height: 100%;
            justify-content: center;
        }

        /* Circular Gauges */
        .gauge-svg {
            filter: drop-shadow(0 0 10px rgba(0, 242, 255, 0.2));
            transition: all 0.3s ease;
        }

        .progress-ring {
            transition: stroke-dashoffset 0.1s ease-out;
            stroke-linecap: round;
        }

        /* Value Displays */
        .digital-value {
            font-family: 'Orbitron', sans-serif;
            text-shadow: var(--glow-cyan);
        }

        .cyber-card {
            background: var(--glass);
            backdrop-filter: blur(15px);
            border: 1px solid rgba(255,255,255,0.05);
            border-radius: 24px;
            padding: 20px;
            position: relative;
            overflow: hidden;
        }

        .cyber-card::before {
            content: '';
            position: absolute;
            top: 0; left: 0; width: 100%; height: 2px;
            background: linear-gradient(90deg, transparent, var(--tesla-cyan), transparent);
        }

        .gear-selector {
            display: flex;
            gap: 20px;
            font-size: 32px;
            font-weight: 900;
            color: rgba(255,255,255,0.1);
            justify-content: center;
            margin-top: -40px;
        }

        .gear-active {
            color: #fff;
            text-shadow: 0 0 20px #fff;
        }

        .car-viz {
            position: relative;
            width: 100%;
            height: 300px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .car-silhouette {
            width: 250px;
            opacity: 0.6;
            filter: drop-shadow(0 0 20px var(--tesla-cyan));
        }

        .door-indicator {
            position: absolute;
            width: 12px; height: 12px;
            border-radius: 50%;
            background: var(--tesla-red);
            display: none;
            box-shadow: 0 0 15px var(--tesla-red);
        }

        /* Status Badges */
        .status-pill {
            position: fixed;
            top: 20px;
            right: 20px;
            display: flex;
            gap: 10px;
        }

        .badge {
            background: rgba(0,0,0,0.6);
            border: 1px solid rgba(255,255,255,0.1);
            padding: 5px 15px;
            border-radius: 100px;
            font-size: 11px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

    </style>
</head>
<body>

    <div class="status-pill">
        <div class="badge" id="ws-badge"><i class="fa-solid fa-bolt mr-2"></i>WS: <span id="ws-val">OFF</span></div>
        <div class="badge" id="obd-badge"><i class="fa-solid fa-car mr-2"></i>OBD: <span id="obd-val">WAIT</span></div>
    </div>

    <div class="dashboard-container">
        
        <div class="side-panel">
            <div class="cyber-card flex flex-col items-center">
                <span class="text-xs text-gray-500 uppercase tracking-widest mb-4">Energy Storage</span>
                <svg width="160" height="160" viewBox="0 0 160 160">
                    <circle cx="80" cy="80" r="70" fill="none" stroke="rgba(255,255,255,0.05)" stroke-width="8" />
                    <circle id="soc-ring" class="progress-ring" cx="80" cy="80" r="70" fill="none" 
                            stroke="var(--tesla-gold)" stroke-width="10" stroke-dasharray="440" stroke-dashoffset="440" 
                            transform="rotate(-90 80 80)" />
                    <text x="80" y="85" text-anchor="middle" class="digital-value fill-white text-3xl font-bold" id="v-soc">0%</text>
                </svg>
                <div class="mt-4 text-center">
                    <div class="text-sm text-blue-400 font-bold"><span id="v-volt">0.0</span>V</div>
                    <div class="text-[10px] text-gray-600">BMS SYSTEM VOLTAGE</div>
                </div>
            </div>

            <div class="cyber-card">
                <span class="text-xs text-gray-500 uppercase tracking-widest mb-2 block text-center">Seat Heaters</span>
                <div class="flex justify-around mt-4">
                    <i id="seat-l" class="fa-solid fa-fire text-2xl text-gray-700 transition-colors"></i>
                    <i id="seat-r" class="fa-solid fa-fire text-2xl text-gray-700 transition-colors"></i>
                </div>
            </div>
        </div>

        <div class="flex flex-col items-center justify-center">
            <div class="relative w-[450px] h-[450px] flex items-center justify-center">
                <svg width="450" height="450" viewBox="0 0 450 450" class="gauge-svg">
                    <defs>
                        <linearGradient id="speedGrad" x1="0%" y1="0%" x2="100%" y2="100%">
                            <stop offset="0%" style="stop-color:var(--tesla-cyan);stop-opacity:1" />
                            <stop offset="100%" style="stop-color:#0088ff;stop-opacity:1" />
                        </linearGradient>
                    </defs>
                    <!-- Track -->
                    <circle cx="225" cy="225" r="200" fill="none" stroke="rgba(255,255,255,0.03)" stroke-width="15" />
                    <!-- Speed Arc -->
                    <circle id="speed-arc" class="progress-ring" cx="225" cy="225" r="200" fill="none" 
                            stroke="url(#speedGrad)" stroke-width="18" stroke-dasharray="1256" stroke-dashoffset="1256" 
                            transform="rotate(135 225 225)" />
                </svg>

                <div class="absolute text-center">
                    <div class="text-[18px] text-gray-500 font-light tracking-[0.5em] mb-[-15px]">VELOCITY</div>
                    <div id="v-speed" class="text-[140px] font-black leading-none digital-value">0</div>
                    <div class="text-2xl text-cyan-400 font-bold mt-[-10px]">KM/H</div>
                </div>
            </div>

            <div class="gear-selector">
                <span id="g-P" class="gear-active">P</span>
                <span id="g-R">R</span>
                <span id="g-N">N</span>
                <span id="g-D">D</span>
            </div>

            <!-- Car Model Viz -->
            <div class="car-viz">
                <img src="https://placehold.co/400x200/000000/ffffff?text=TESLA+MODEL+Y" class="car-silhouette" alt="Tesla Viz">
                <!-- Doors indicators (simulated from 0DA) -->
                <div id="door-fl" class="door-indicator" style="top: 120px; left: 180px;"></div>
                <div id="door-fr" class="door-indicator" style="top: 120px; right: 180px;"></div>
            </div>
        </div>

        <div class="side-panel">
            <div class="cyber-card flex flex-col items-center">
                <span class="text-xs text-gray-500 uppercase tracking-widest mb-4">Climate Control</span>
                <div class="flex items-center gap-6">
                    <button onclick="adjustClimate(-0.5)" class="text-4xl text-blue-400 hover:text-white active:scale-90 transition-all">-</button>
                    <div class="text-center">
                        <div class="text-5xl font-black digital-value" id="v-climate">21.0</div>
                        <div class="text-xs text-blue-300 font-bold uppercase mt-2 tracking-widest">Celsius</div>
                    </div>
                    <button onclick="adjustClimate(0.5)" class="text-4xl text-red-400 hover:text-white active:scale-90 transition-all">+</button>
                </div>
                <div class="mt-8 grid grid-cols-2 gap-4 w-full">
                    <button onclick="sendSecureCmd('0DA', '02 00 00 00 00 00 00 00')" class="bg-emerald-500/10 border border-emerald-500/20 py-2 rounded-xl text-[10px] uppercase font-bold text-emerald-400 hover:bg-emerald-500/20 transition-all">Unlock</button>
                    <button onclick="sendSecureCmd('0DA', '01 00 00 00 00 00 00 00')" class="bg-red-500/10 border border-red-500/20 py-2 rounded-xl text-[10px] uppercase font-bold text-red-400 hover:bg-red-500/20 transition-all">Lock</button>
                </div>
            </div>

            <div class="cyber-card">
                <span class="text-[10px] text-gray-600 uppercase tracking-widest mb-2 block">Network Latency</span>
                <div class="flex items-end gap-1 h-8">
                    <div class="bg-cyan-500 w-full h-[20%]"></div>
                    <div class="bg-cyan-500 w-full h-[40%]"></div>
                    <div class="bg-cyan-500 w-full h-[30%]"></div>
                    <div id="ping-bar" class="bg-cyan-400 w-full h-[80%] shadow-[0_0_10px_cyan]"></div>
                </div>
            </div>
        </div>
    </div>

    <script>
        const ESP_IP = "192.168.43.150"; 
        const VIN_PATH = "/5YJYGDEF1LF009721";
        const fbConfig = {
            apiKey: "AIzaSyAH3yVbBGrhvzbSx7J1GxNcVsl_ykX_OX0",
            databaseURL: "https://tesla-telemetry-29fb6-default-rtdb.europe-west1.firebasedatabase.app"
        };

        firebase.initializeApp(fbConfig);
        const db = firebase.database();

        let socket;
        let isWsActive = false;
        let climateLock = false;

        function updateDisplay(data) {
            // 1. Speedometer Update (Center)
            if (data.speed !== undefined) {
                const speed = parseInt(data.speed);
                document.getElementById('v-speed').innerText = speed;
                const offset = 1256 - (Math.min(speed, 250) / 250) * 942; // 270 degree arc
                document.getElementById('speed-arc').style.strokeDashoffset = offset;
            }

            // 2. State of Charge (Left)
            if (data.soc !== undefined) {
                const soc = parseFloat(data.soc);
                document.getElementById('v-soc').innerText = soc.toFixed(1) + "%";
                const socOffset = 440 - (soc / 100) * 440;
                document.getElementById('soc-ring').style.strokeDashoffset = socOffset;
            }

            // 3. System Voltage
            if (data.volt !== undefined) {
                document.getElementById('v-volt').innerText = parseFloat(data.volt).toFixed(1);
            }

            // 4. Gear Selection
            if (data.gear !== undefined) {
                ["P", "R", "N", "D"].forEach(g => {
                    document.getElementById(`g-${g}`).className = (data.gear === g) ? 'gear-active' : '';
                });
            }

            // 5. Climate Control (Respect User Lock)
            if (data.climate && !climateLock) {
                const temp = data.climate.replace("141 ", "").trim();
                if (!isNaN(temp)) document.getElementById('v-climate').innerText = temp;
            }

            // 6. Security & Car State Indicators
            if (data.doors) {
                // simple bitmask logic for visualization
                const isAnyDoorOpen = data.doors.includes("01") || data.doors.includes("02");
                document.getElementById('door-fl').style.display = isAnyDoorOpen ? 'block' : 'none';
            }

            // 7. Status Badges
            document.getElementById('obd-val').innerText = data.obd ? "LIVE" : "WAIT";
            document.getElementById('obd-badge').className = data.obd ? "badge border-emerald-500/50 text-emerald-400" : "badge";
        }

        window.adjustClimate = function(change) {
            climateLock = true;
            let el = document.getElementById('v-climate');
            let current = parseFloat(el.innerText);
            current += change;
            current = Math.min(Math.max(current, 15), 28);
            el.innerText = current.toFixed(1);
            
            sendSecureCmd('141', `SET ${current.toFixed(1)}`);
            setTimeout(() => { climateLock = false; }, 4000);
        }

        function connectWS() {
            try {
                if (window.location.protocol === 'https:') return;
                socket = new WebSocket(`ws://${ESP_IP}:81/`);

                socket.onopen = () => {
                    isWsActive = true;
                    document.getElementById('ws-val').innerText = "LIVE (20Hz)";
                    document.getElementById('ws-badge').className = "badge border-cyan-500 text-cyan-400";
                };

                socket.onmessage = (e) => {
                    try { updateDisplay(JSON.parse(e.data)); } catch (err) {}
                };

                socket.onclose = () => {
                    isWsActive = false;
                    document.getElementById('ws-val').innerText = "OFF";
                    document.getElementById('ws-badge').className = "badge";
                    setTimeout(connectWS, 10000);
                };
            } catch (e) {}
        }

        db.ref(VIN_PATH + '/telemetry').on('value', (snap) => {
            if (!isWsActive && snap.val()) updateDisplay(snap.val());
        });

        window.sendSecureCmd = function(id, hex) {
            const unix = Math.floor(Date.now() / 1000);
            db.ref(VIN_PATH + '/command').set(`${id}|${hex}|${unix}`);
        };

        // Start App
        connectWS();
    </script>
</body>
</html>
