<!DOCTYPE html>
<html lang="ka">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tesla Model Y - Telemetry</title>
    
    <!-- Firebase ბიბლიოთეკების შემოტანა -->
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>

    <style>
        * { box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background-color: #111;
            color: #fff;
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        .container {
            width: 100%;
            max-width: 500px;
            background: #1e1e1e;
            padding: 25px;
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.8);
        }
        h1 { 
            text-align: center; 
            color: #e82127; /* Tesla Red */
            margin-top: 0;
            font-weight: 600;
            letter-spacing: 1px;
        }
        .status-dot {
            height: 10px;
            width: 10px;
            background-color: #00ffcc;
            border-radius: 50%;
            display: inline-block;
            margin-right: 8px;
            box-shadow: 0 0 10px #00ffcc;
        }
        .status-text {
            text-align: center;
            font-size: 14px;
            color: #aaa;
            margin-bottom: 25px;
        }
        .grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
            margin-bottom: 20px;
        }
        .card {
            background: #2a2a2a;
            padding: 20px 15px;
            border-radius: 15px;
            text-align: center;
            border-top: 3px solid #444;
            transition: 0.3s;
        }
        .card:hover { border-top-color: #e82127; }
        .card-title {
            font-size: 14px;
            color: #888;
            margin-bottom: 10px;
        }
        .card-value {
            font-size: 28px;
            font-weight: bold;
            color: #fff;
        }
        .unit { font-size: 16px; color: #666; }
        
        .location-card {
            background: #2a2a2a;
            padding: 20px;
            border-radius: 15px;
            margin-bottom: 20px;
        }
        .coords {
            font-family: monospace;
            color: #00ffcc;
            font-size: 16px;
            margin-top: 5px;
        }
        #map-container {
            width: 100%;
            height: 300px; /* რუკის სიმაღლე გავზარდეთ უკეთესი ხედვისთვის */
            border-radius: 10px;
            overflow: hidden;
            background: #333;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #888;
            margin-top: 15px;
        }
        iframe {
            width: 100%;
            height: 100%;
            border: none;
            display: none;
        }
    </style>
</head>
<body>

    <div class="container">
        <h1>TESLA DASHBOARD</h1>
        <div class="status-text"><span class="status-dot"></span>დაკავშირებულია მონაცემთა ბაზასთან</div>
        
        <div class="grid">
            <div class="card">
                <div class="card-title">⚡ სიჩქარე</div>
                <div class="card-value" id="speed_val">0 <span class="unit">km/h</span></div>
            </div>
            
            <div class="card">
                <div class="card-title">🔋 ბატარეა (SOC)</div>
                <div class="card-value" id="soc_val">0 <span class="unit">%</span></div>
            </div>
        </div>
        
        <div class="card" style="margin-bottom: 20px;">
            <div class="card-title">🌡️ ელემენტის ტემპერატურა</div>
            <div class="card-value" id="temp_val">0 <span class="unit">°C</span></div>
        </div>

        <div class="location-card">
            <div class="card-title">📍 რეალური ლოკაცია</div>
            <div class="coords" id="gps_coords">მონაცემები იტვირთება...</div>
            
            <div id="map-container">
                <span id="map-message">რუკის ჩასატვირთად საჭიროა ლოკაციის განახლება...</span>
                <iframe id="map_iframe" src=""></iframe>
            </div>
        </div>
    </div>

    <script>
        const firebaseConfig = {
            databaseURL: "https://tesla-telemetry-29fb6-default-rtdb.europe-west1.firebasedatabase.app/"
        };

        if (!firebase.apps.length) {
            firebase.initializeApp(firebaseConfig);
        }
        const database = firebase.database();
        const telemetryRef = database.ref('/Tesla/Telemetry');
        
        telemetryRef.on('value', (snapshot) => {
            const data = snapshot.val();
            
            if(data) {
                document.getElementById('soc_val').innerHTML = (data.SOC || 0) + ' <span class="unit">%</span>';
                document.getElementById('temp_val').innerHTML = (data.BatteryTemp || 0) + ' <span class="unit">°C</span>';
                document.getElementById('speed_val').innerHTML = (data.Speed || 0) + ' <span class="unit">km/h</span>';
                
                if(data.Latitude !== undefined && data.Longitude !== undefined) {
                    const lat = parseFloat(data.Latitude);
                    const lng = parseFloat(data.Longitude);
                    
                    document.getElementById('gps_coords').innerText = `Lat: ${lat.toFixed(5)} | Lng: ${lng.toFixed(5)}`;
                    
                    const mapIframe = document.getElementById('map_iframe');
                    const mapMsg = document.getElementById('map-message');
                    
                    // ვამოწმებთ თუ კოორდინატები რეალურია (დედამიწის ფარგლებში)
                    if(Math.abs(lat) <= 90 && Math.abs(lng) <= 180 && lat !== 0) {
                        // Google Maps-ის ლინკი z=16 ზუმით (მიახლოებით)
                        const mapUrl = `https://maps.google.com/maps?q=${lat},${lng}&z=16&output=embed`;
                        
                        // ვანახლებთ მხოლოდ მაშინ, თუ ლოკაცია მართლა შეიცვალა (რომ რუკა არ ციმციმებდეს)
                        if(mapIframe.src !== mapUrl) {
                            mapIframe.src = mapUrl;
                        }
                        
                        mapIframe.style.display = 'block';
                        mapMsg.style.display = 'none';
                    } else {
                        mapIframe.style.display = 'none';
                        mapMsg.style.display = 'block';
                        mapMsg.innerText = "მიღებულია არასწორი კოორდინატები (საჭიროა CAN კალიბრაცია).";
                        mapMsg.style.color = "#ffaa00";
                    }
                }
            }
        });
    </script>
</body>
</html>
