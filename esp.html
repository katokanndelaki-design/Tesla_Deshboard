<!DOCTYPE html>
<html lang="ka">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tesla Model Y - Telemetry</title>
    
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>

    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #111;
            color: #fff;
            text-align: center;
            padding: 20px;
        }
        .container {
            max-width: 600px;
            margin: 0 auto;
            background: #222;
            padding: 20px;
            border-radius: 15px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.5);
        }
        h1 { color: #e82127; }
        .data-box {
            background: #333;
            margin: 15px 0;
            padding: 15px;
            border-radius: 10px;
            font-size: 24px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .label { font-size: 18px; color: #aaa; }
        .value { font-weight: bold; color: #00ffcc; }
        
        #map-container {
            margin-top: 20px;
            width: 100%;
            height: 300px;
            border-radius: 10px;
            overflow: hidden;
            border: 2px solid #444;
        }
        iframe {
            width: 100%;
            height: 100%;
            border: none;
        }
    </style>
</head>
<body>

    <div class="container">
        <h1>Tesla Model Y</h1>
        
        <div class="data-box">
            <span class="label">🔋 ბატარეა (SOC):</span>
            <span class="value" id="soc_val">-- %</span>
        </div>
        
        <div class="data-box">
            <span class="label">🌡️ ტემპერატურა:</span>
            <span class="value" id="temp_val">-- °C</span>
        </div>

        <div class="data-box">
            <span class="label">⚡ სიჩქარე:</span>
            <span class="value" id="speed_val">-- km/h</span>
        </div>

        <div class="data-box" style="flex-direction: column; align-items: flex-start;">
            <span class="label">📍 ლოკაცია:</span>
            <span class="value" id="gps_coords" style="font-size: 16px; margin-top: 5px;">ეძებს...</span>
        </div>

        <div id="map-container">
            <iframe id="map_iframe" src=""></iframe>
        </div>
    </div>

    <script>
        // 1. შენი Firebase მონაცემთა ბაზის კონფიგურაცია
        const firebaseConfig = {
            databaseURL: "https://tesla-telemetry-29fb6-default-rtdb.europe-west1.firebasedatabase.app/"
        };

        // 2. Firebase-ის ინიციალიზაცია
        firebase.initializeApp(firebaseConfig);
        const database = firebase.database();

        // 3. მონაცემების ცოცხლად წაკითხვა
        const telemetryRef = database.ref('/Tesla/Telemetry');
        
        telemetryRef.on('value', (snapshot) => {
            const data = snapshot.val();
            
            if(data) {
                // ციფრების განახლება
                document.getElementById('soc_val').innerText = (data.SOC || 0) + " %";
                document.getElementById('temp_val').innerText = (data.BatteryTemp || 0) + " °C";
                document.getElementById('speed_val').innerText = (data.Speed || 0) + " km/h";
                
                // ლოკაციის და რუკის განახლება
                if(data.Latitude && data.Longitude) {
                    const lat = data.Latitude;
                    const lng = data.Longitude;
                    
                    document.getElementById('gps_coords').innerText = lat + ", " + lng;
                    
                    // OpenStreetMap-ის რუკის გენერაცია კოორდინატების მიხედვით
                    const mapUrl = `https://www.openstreetmap.org/export/embed.html?bbox=${lng-0.01},${lat-0.01},${lng+0.01},${lat+0.01}&layer=mapnik&marker=${lat},${lng}`;
                    document.getElementById('map_iframe').src = mapUrl;
                }
            }
        });
    </script>
</body>
</html>
