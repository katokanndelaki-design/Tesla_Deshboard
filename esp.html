<!DOCTYPE html>
<html lang="ka">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tesla CAN Sniffer</title>
    
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>

    <style>
        body {
            font-family: 'Segoe UI', monospace, sans-serif;
            background-color: #0a0a0a;
            color: #00ffcc;
            margin: 0;
            padding: 20px;
        }
        .container {
            max-width: 800px;
            margin: 0 auto;
            background: #111;
            padding: 20px;
            border-radius: 12px;
            border: 1px solid #333;
            box-shadow: 0 5px 20px rgba(0,0,0,0.8);
        }
        h1 { color: #fff; text-align: center; }
        
        .vin-box {
            background: #1a1a1a;
            border: 2px solid #e82127;
            padding: 15px;
            border-radius: 8px;
            text-align: center;
            margin-bottom: 20px;
        }
        .vin-title { color: #888; font-size: 14px; text-transform: uppercase; margin-bottom: 5px; }
        .vin-value { color: #fff; font-size: 26px; font-weight: bold; letter-spacing: 3px; font-family: monospace; }

        .btn-download {
            display: block;
            width: 100%;
            padding: 15px;
            background-color: #2a2a2a;
            color: white;
            border: 1px solid #444;
            border-radius: 8px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            margin-bottom: 20px;
            transition: 0.2s;
        }
        .btn-download:hover { background-color: #444; }

        .log-box {
            background: #000;
            border: 1px solid #333;
            padding: 15px;
            height: 450px;
            overflow-y: auto;
            border-radius: 8px;
        }
        table { width: 100%; border-collapse: collapse; font-family: monospace; }
        th { text-align: left; border-bottom: 2px solid #333; padding-bottom: 10px; color: #aaa; }
        td { padding: 8px 0; border-bottom: 1px solid #222; }
        .id-col { color: #ffaa00; font-weight: bold; width: 120px; }
        .data-col { letter-spacing: 2px; }
    </style>
</head>
<body>

    <div class="container">
        <h1>📡 Tesla CAN Sniffer</h1>
        
        <!-- VIN კოდის ჩვენება -->
        <div class="vin-box">
            <div class="vin-title">ავტომობილის VIN კოდი</div>
            <div class="vin-value" id="vin_display">იძებნება...</div>
        </div>

        <button class="btn-download" onclick="downloadLogs()">💾 ლოგების გადმოწერა (TXT)</button>

        <div class="log-box">
            <table id="log-table">
                <thead>
                    <tr>
                        <th>CAN ID (Hex)</th>
                        <th>Data (Bytes)</th>
                    </tr>
                </thead>
                <tbody id="log-body">
                    <tr><td colspan="2" style="text-align: center; color: #888;">მონაცემების მოლოდინი...</td></tr>
                </tbody>
            </table>
        </div>
    </div>

    <script>
        const firebaseConfig = {
            databaseURL: "https://tesla-telemetry-29fb6-default-rtdb.europe-west1.firebasedatabase.app/"
        };
        if (!firebase.apps.length) { firebase.initializeApp(firebaseConfig); }
        const database = firebase.database();
        
        // 1. VIN კოდის ცოცხალი წაკითხვა
        database.ref('/Tesla/Telemetry/VIN').on('value', (snapshot) => {
            const vin = snapshot.val();
            if(vin) {
                document.getElementById('vin_display').innerText = vin;
            }
        });

        // 2. ლოგების წაკითხვა
        const rawRef = database.ref('/Tesla/RawCAN');
        let latestLogs = ""; 

        rawRef.on('value', (snapshot) => {
            const data = snapshot.val();
            if(!data) return;

            const tbody = document.getElementById('log-body');
            tbody.innerHTML = '';
            
            // ვამატებთ VIN კოდს ტექსტური ფაილის თავში
            const currentVin = document.getElementById('vin_display').innerText;
            latestLogs = `Tesla Model Y - CAN Bus Dump\nVIN: ${currentVin}\n----------------------------\n`;

            const sortedIds = Object.keys(data).sort();

            sortedIds.forEach(id => {
                const hexData = data[id];
                const tr = document.createElement('tr');
                tr.innerHTML = `<td class="id-col">${id}</td><td class="data-col">${hexData}</td>`;
                tbody.appendChild(tr);

                latestLogs += `${id} : ${hexData}\n`;
            });
        });

        // 3. გადმოწერის ფუნქცია
        function downloadLogs() {
            if(!latestLogs || latestLogs.length < 50) {
                alert("ჯერ მონაცემები არ შემოსულა, დაელოდე რამდენიმე წამი!");
                return;
            }
            const blob = new Blob([latestLogs], { type: 'text/plain' });
            const url = window.URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = 'Tesla_CAN_Logs.txt';
            document.body.appendChild(a);
            a.click();
            document.body.removeChild(a);
        }
    </script>
</body>
</html>
