<!DOCTYPE html>
<html lang="ka">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Tesla Model Y - Live Telemetry</title>
    
    <!-- Firebase -->
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>

    <!-- Leaflet.js (ნავიგაციის ძრავი) -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

    <style>
        * { box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background-color: #121212;
            color: #ffffff;
            margin: 0;
            padding: 15px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        .container {
            width: 100%;
            max-width: 600px;
            background: #1e1e1e;
            padding: 20px;
            border-radius: 20px;
            box-shadow: 0 8px 25px rgba(0,0,0,0.7);
        }
        h1 { 
            text-align: center; 
            color: #e82127;
            margin-top: 0;
            margin-bottom: 5px;
            font-size: 24px;
            letter-spacing: 1px;
        }
        .status-box {
            text-align: center;
            font-size: 13px;
            color: #888;
            margin-bottom: 20px;
        }
        .status-dot {
            height: 10px;
            width: 10px;
            background-color: #00ffcc;
            border-radius: 50%;
            display: inline-block;
            margin-right: 6px;
            box-shadow: 0 0 8px #00ffcc;
        }
        .grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
            margin-bottom: 15px;
        }
        .card {
            background: #2a2a2a;
            padding: 15px;
            border-radius: 12px;
            text-align: center;
            border-top: 3px solid #444;
        }
        .card-title {
            font-size: 13px;
            color: #aaa;
            margin-bottom: 8px;
        }
        .card-value {
            font-size: 24px;
            font-weight: bold;
            color: #fff;
        }
        .unit { font-size: 14px; color: #777; }
        
        .map-wrapper {
            background: #2a2a2a;
            padding: 15px;
            border-radius: 12px;
            margin-top: 15px;
        }
        .coords-info {
            font-family: monospace;
            color: #00ffcc;
            font-size: 14px;
            margin-top: 5px;
            margin-bottom: 10px;
        }
        .error-msg {
            color: #ffaa00;
            font-size: 12px;
            margin-bottom: 10px;
            display: none;
        }
        /* რუკის სტილი */
        #map {
            width: 100%;
            height: 350px;
            border-radius: 10px;
            z-index: 1; /* რომ მენიუებს არ გადაეფაროს */
        }
        .leaflet-container {
            background: #222;
        }
    </style>
</head>
<body>

    <div class="container">
        <h1>TESLA DASHBOARD</h1>
        <div class="status-box"><span class="status-dot"></span>LIVE TELEMETRY</div>
        
        <div class="grid">
            <div class="card">
                <div class="card-title">⚡ სიჩქარე</div>
                <div class="card-value" id="speed_val">0 <span class="unit">km/h</span></div>
            </div>
            
            <div class="card">
                <div class="card-title">🔋 ბატარეა (SOC)</div>
                <div class="card-value" id="soc_val">0 <span class="unit">%</span></div>
            </div>
        </div>
        
        <div class="card">
            <div class="card-title">🌡️ ელემენტის ტემპერატურა</div>
            <div class="card-value" id="temp_val">0 <span class="unit">°C</span></div>
        </div>

        <div class="map-wrapper">
            <div class="card-title" style="text-align: left;">📍 LIVE ნავიგაცია</div>
            <div class="coords-info" id="gps_coords">Lat: -- | Lng: --</div>
            <div class="error-msg" id="gps_error">⚠ CAN Bus-დან მოდის არასწორი კოორდინატები. ნაჩვენებია დეფოლტ ლოკაცია.</div>
            
            <div id="map"></div>
        </div>
    </div>

    <script>
        // 1. რუკის ინიციალიზაცია (იტვირთება მხოლოდ ერთხელ!)
        // საწყისი ლოკაცია: თბილისი
        var map = L.map('map').setView([41.7151, 44.8271], 13);
        
        // მუქი თემის რუკის ფილები (Dark Mode Map)
        L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png', {
            attribution: '&copy; OpenStreetMap',
            maxZoom: 19
        }).addTo(map);

        // მანქანის მარკერი (თავიდან დამალულია)
        var carMarker = null;

        // 2. Firebase კონფიგურაცია
        const firebaseConfig = {
            databaseURL: "https://tesla-telemetry-29fb6-default-rtdb.europe-west1.firebasedatabase.app/"
        };
        if (!firebase.apps.length) { firebase.initializeApp(firebaseConfig); }
        const database = firebase.database();
        const telemetryRef = database.ref('/Tesla/Telemetry');
        
        // 3. მონაცემების ცოცხალი განახლება
        telemetryRef.on('value', (snapshot) => {
            const data = snapshot.val();
            if(!data) return;

            // UI რიცხვების განახლება
            document.getElementById('soc_val').innerHTML = (data.SOC || 0) + ' <span class="unit">%</span>';
            document.getElementById('temp_val').innerHTML = (data.BatteryTemp || 0) + ' <span class="unit">°C</span>';
            document.getElementById('speed_val').innerHTML = (data.Speed || 0) + ' <span class="unit">km/h</span>';
            
            // ლოკაციის ლოგიკა
            if(data.Latitude !== undefined && data.Longitude !== undefined) {
                const lat = parseFloat(data.Latitude);
                const lng = parseFloat(data.Longitude);
                
                document.getElementById('gps_coords').innerText = `Lat: ${lat.toFixed(4)} | Lng: ${lng.toFixed(4)}`;
                
                // ვამოწმებთ არის თუ არა კოორდინატები რეალური (მაგ: არა 1409.83)
                if(Math.abs(lat) <= 90 && Math.abs(lng) <= 180 && lat !== 0) {
                    document.getElementById('gps_error').style.display = 'none';
                    
                    // თუ მარკერი არ არსებობს ვქმნით, თუ არსებობს - ვასრიალებთ ახალ წერტილზე
                    if(!carMarker) {
                        carMarker = L.marker([lat, lng]).addTo(map);
                        map.setView([lat, lng], 16);
                    } else {
                        carMarker.setLatLng([lat, lng]);
                        // რუკის ცენტრი მიყვება მარკერს რბილად (Smooth Pan)
                        map.panTo([lat, lng]); 
                    }
                } else {
                    // თუ კოორდინატები არარეალურია (1400+)
                    document.getElementById('gps_error').style.display = 'block';
                }
            }
        });
    </script>
</body>
</html>
