<!DOCTYPE html>
<html lang="ka">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tesla Control Center</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #121212;
            color: #ffffff;
            text-align: center;
            padding: 50px;
            margin: 0;
        }
        h1 {
            color: #e50914;
            letter-spacing: 2px;
            margin-bottom: 40px;
        }
        .dashboard {
            display: flex;
            justify-content: center;
            gap: 30px;
            margin-bottom: 50px;
            flex-wrap: wrap;
        }
        .card {
            background: #1e1e1e;
            padding: 30px;
            border-radius: 15px;
            width: 180px;
            box-shadow: 0 8px 16px rgba(0,0,0,0.6);
            border-top: 4px solid #e50914;
        }
        .card h3 {
            margin-top: 0;
            font-size: 1.1em;
            color: #aaaaaa;
            text-transform: uppercase;
        }
        .card p {
            font-size: 2.5em;
            margin: 10px 0 0 0;
            font-weight: bold;
            color: #ffffff;
        }
        .unit {
            font-size: 0.4em;
            color: #888888;
        }
        .controls {
            margin-top: 20px;
        }
        button {
            background-color: #e50914;
            color: white;
            border: none;
            padding: 20px 40px;
            font-size: 1.2em;
            font-weight: bold;
            border-radius: 50px;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 4px 10px rgba(229, 9, 20, 0.4);
        }
        button:hover {
            background-color: #b20710;
            box-shadow: 0 6px 15px rgba(229, 9, 20, 0.6);
            transform: translateY(-2px);
        }
        button:active {
            transform: translateY(1px);
        }
        .status {
            margin-top: 30px;
            font-size: 0.9em;
            color: #00ff00;
        }
    </style>

    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
</head>
<body>

    <h1>TESLA DASHBOARD</h1>
    
    <div class="dashboard">
        <div class="card">
            <h3>სიჩქარე</h3>
            <p><span id="speed">0</span> <span class="unit">km/h</span></p>
        </div>
        <div class="card">
            <h3>ბატარეა (SoC)</h3>
            <p><span id="soc">0</span> <span class="unit">%</span></p>
        </div>
        <div class="card">
            <h3>ტემპერატურა</h3>
            <p><span id="temp">0</span> <span class="unit">°C</span></p>
        </div>
    </div>

    <div class="controls">
        <button onclick="sendUnlockCommand()">🔓 კარების განბლოკვა</button>
    </div>

    <div class="status" id="status-text">
        კავშირი Firebase-თან დამყარებულია...
    </div>

    <script>
        // 1. შენი ზუსტი Firebase კონფიგურაცია
        const firebaseConfig = {
            apiKey: "AIzaSyAH3yVbBGrhvzbSx7J1GxNcVsl_ykX_OX0",
            authDomain: "tesla-telemetry-29fb6.firebaseapp.com",
            databaseURL: "https://tesla-telemetry-29fb6-default-rtdb.europe-west1.firebasedatabase.app",
            projectId: "tesla-telemetry-29fb6",
            storageBucket: "tesla-telemetry-29fb6.firebasestorage.app",
            messagingSenderId: "468148958454",
            appId: "1:468148958454:web:13601bd03ab63be11b68d7"
        };

        // 2. Firebase-ის ინიციალიზაცია
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        // 3. ტელემეტრიის მოსმენა რეალურ დროში (Real-time Listener)
        db.ref('/Tesla/Telemetry/Speed').on('value', (snapshot) => {
            const val = snapshot.val();
            document.getElementById('speed').innerText = val !== null ? parseFloat(val).toFixed(0) : "0";
        });

        db.ref('/Tesla/Telemetry/SOC').on('value', (snapshot) => {
            const val = snapshot.val();
            document.getElementById('soc').innerText = val !== null ? parseFloat(val).toFixed(1) : "0";
        });

        db.ref('/Tesla/Telemetry/BatteryTemp').on('value', (snapshot) => {
            const val = snapshot.val();
            document.getElementById('temp').innerText = val !== null ? val : "0";
        });

        // 4. ბრძანების გაგზავნის ფუნქცია
        function sendUnlockCommand() {
            const statusText = document.getElementById('status-text');
            statusText.style.color = "#ffff00";
            statusText.innerText = "ბრძანება იგზავნება...";

            // ვწერთ ციფრ '1'-ს /Tesla/Commands/Unlock ბაზაში
            db.ref('/Tesla/Commands/Unlock').set(1)
            .then(() => {
                statusText.style.color = "#00ff00";
                statusText.innerText = "ბრძანება გაგზავნილია: განბლოკვა!";
                
                // 3 წამის შემდეგ ტექსტის აღდგენა
                setTimeout(() => {
                    statusText.innerText = "სისტემა მზადაა";
                }, 3000);
            })
            .catch((error) => {
                console.error("შეცდომა ბრძანების გაგზავნისას:", error);
                statusText.style.color = "#ff0000";
                statusText.innerText = "შეცდომა კავშირისას!";
            });
        }
    </script>
</body>
</html>
