<!DOCTYPE html>
<html lang="ka">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tesla ESP32 - Cloud Dashboard</title>
    <!-- Firebase V8 Compat SDKs -->
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
    
    <style>
        :root { --tesla-red: #E82127; --bg-dark: #121212; --panel-bg: #1e1e1e; --text-light: #f4f4f4; }
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: var(--bg-dark); color: var(--text-light); margin: 0; padding: 20px; display: flex; flex-direction: column; align-items: center; }
        h1 { color: var(--tesla-red); letter-spacing: 2px; text-transform: uppercase; }
        .dashboard { display: grid; grid-template-columns: 1fr; gap: 20px; width: 100%; max-width: 600px; }
        .card { background-color: var(--panel-bg); padding: 20px; border-radius: 12px; box-shadow: 0 8px 16px rgba(0,0,0,0.5); border-left: 4px solid var(--tesla-red); }
        h3 { margin-top: 0; border-bottom: 1px solid #333; padding-bottom: 10px; }
        .btn-group { display: flex; flex-direction: column; gap: 10px; }
        button { background-color: #333; color: white; border: none; padding: 15px; border-radius: 8px; cursor: pointer; font-size: 16px; transition: 0.3s; }
        button:hover { background-color: #444; }
        button.active { background-color: var(--tesla-red); font-weight: bold; }
        input[type="text"], input[type="password"] { width: 100%; padding: 12px; margin-top: 10px; border-radius: 6px; border: 1px solid #444; background: #2a2a2a; color: white; box-sizing: border-box; }
        .status { font-size: 14px; color: #888; margin-top: 10px; text-align: center; margin-bottom: 20px; }
        .connected { color: #4CAF50; font-weight: bold; }
        
        /* ტელემეტრიის სტილები */
        .telemetry-box { display: flex; justify-content: space-between; align-items: center; background: #000; padding: 15px; border-radius: 10px; margin-top: 10px; }
        .speed-val { font-size: 48px; font-weight: bold; color: white; }
        .speed-unit { font-size: 16px; color: #888; }
        .info-badge { background: #333; padding: 5px 10px; border-radius: 5px; font-weight: bold; font-size: 18px;}
    </style>
</head>
<body>

    <h1>Tesla ESP32 Control</h1>
    <div class="status" id="db-status">კავშირი Firebase-თან: მიმდინარეობს...</div>

    <!-- ავტორიზაციის (Login) ეკრანი -->
    <div id="login-view" class="card" style="display: none; width: 100%; max-width: 400px; text-align: center;">
        <h3>🔒 უსაფრთხოება</h3>
        <p style="font-size: 14px; color: #aaa;">სისტემაში შესასვლელად შეიყვანეთ PIN კოდი</p>
        <input type="password" id="pin-input" placeholder="შეიყვანეთ PIN კოდი">
        <button style="margin-top: 15px; width: 100%; background-color: var(--tesla-red);" onclick="login()">ავტორიზაცია</button>
    </div>

    <!-- მთავარი სამართავი პანელი -->
    <div id="app-view" class="dashboard" style="display: none;">
        
        <!-- ცოცხალი ტელემეტრია (Live Dashboard) -->
        <div class="card" id="live-dashboard" style="display: none; border-left-color: #4CAF50;">
            <h3>🏎️ ცოცხალი ტელემეტრია</h3>
            <div class="telemetry-box">
                <div>
                    <span class="speed-val" id="live-speed">0</span>
                    <span class="speed-unit">KM/H</span>
                </div>
                <div style="text-align: right;">
                    <div style="margin-bottom: 10px; color: #aaa;">სიჩქარე: <span class="info-badge" id="live-gear" style="color: #f39c12;">P</span></div>
                    <div style="color: #aaa;">ელემენტი: <span class="info-badge" id="live-soc" style="color: #4CAF50;">0%</span></div>
                </div>
            </div>
        </div>

        <!-- მოდულების კონტროლი -->
        <div class="card">
            <h3>აქტიური მოდული</h3>
            <div class="btn-group">
                <button id="btn-telemetry" onclick="setModule('telemetry')">📊 CAN ტელემეტრია (ჩართვა)</button>
                <button id="btn-key_emulator" onclick="setModule('key_emulator')">🔑 BLE გასაღების კლონირება</button>
                <button id="btn-tpms_spoof" onclick="setModule('tpms_spoof')">🛞 TPMS სენსორის სიმულაცია</button>
            </div>
        </div>
        
        <!-- სანდო მოწყობილობები და სეთინგები გამორჩენილია სივრცის დასაზოგად, თუმცა კოდში რჩება -->
    </div>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyAH3yVbBGrhvzbSx7J1GxNcVsl_ykX_OX0",
            databaseURL: "https://tesla-telemetry-29fb6-default-rtdb.europe-west1.firebasedatabase.app"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        let currentDeviceId = localStorage.getItem('tesla_device_id') || ('DEV-' + Math.random().toString(36).substr(2, 9).toUpperCase());
        localStorage.setItem('tesla_device_id', currentDeviceId);

        const securityPath = 'TeslaDevice/System/security';
        const modulePath = 'TeslaDevice/System/config/active_module';
        const telemetryPath = 'TeslaDevice/System/telemetry';

        // ავტორიზაცია
        db.ref(securityPath + '/trusted_devices/' + currentDeviceId).on('value', (snap) => {
            document.getElementById('db-status').innerHTML = 'კავშირი Firebase-თან: <span class="connected">აქტიურია</span>';
            if (snap.exists()) {
                document.getElementById('login-view').style.display = 'none';
                document.getElementById('app-view').style.display = 'grid';
            } else {
                document.getElementById('login-view').style.display = 'block';
                document.getElementById('app-view').style.display = 'none';
            }
        });

        function login() {
            const pin = document.getElementById('pin-input').value;
            db.ref(securityPath + '/master_pin').once('value').then(snap => {
                const masterPin = snap.val() || '24082408';
                if (pin === masterPin) {
                    db.ref(securityPath + '/trusted_devices/' + currentDeviceId).set({
                        name: "Web Browser", addedAt: new Date().toISOString()
                    });
                } else alert('არასწორი PIN კოდი!');
            });
        }

        // მოდულის კონტროლი და Dashboard-ის ჩვენება
        db.ref(modulePath).on('value', (snapshot) => {
            const activeModule = snapshot.val();
            document.querySelectorAll('.btn-group button').forEach(btn => btn.classList.remove('active'));
            if(activeModule) {
                const activeBtn = document.getElementById('btn-' + activeModule);
                if(activeBtn) activeBtn.classList.add('active');
                
                // ტელემეტრიის დაფის გამოჩენა მხოლოდ მაშინ, თუ ეგ რეჟიმია ჩართული
                document.getElementById('live-dashboard').style.display = (activeModule === 'telemetry') ? 'block' : 'none';
            }
        });

        function setModule(moduleName) { db.ref(modulePath).set(moduleName); }

        // ცოცხალი მონაცემების მოსმენა (სიჩქარე, SOC, Gear)
        db.ref(telemetryPath).on('value', (snapshot) => {
            const data = snapshot.val();
            if(data) {
                if(data.speed !== undefined) document.getElementById('live-speed').innerText = data.speed;
                if(data.soc !== undefined) document.getElementById('live-soc').innerText = data.soc + '%';
                if(data.gear !== undefined) document.getElementById('live-gear').innerText = data.gear;
            }
        });
    </script>
</body>
</html>
