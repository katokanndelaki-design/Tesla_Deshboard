<!DOCTYPE html>
<html lang="ka">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tesla OS - Multimedia System</title>
    
    <!-- Firebase -->
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>

    <!-- Leaflet.js -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    
    <!-- Leaflet Routing Machine -->
    <script src="https://unpkg.com/leaflet-routing-machine@latest/dist/leaflet-routing-machine.js"></script>

    <style>
        body { margin: 0; padding: 0; overflow: hidden; background-color: #000; font-family: 'Segoe UI', sans-serif; color: #fff; user-select: none; }
        
        #map { position: absolute; top: 0; left: 0; width: 100vw; height: 100vh; z-index: 1; background: #111; }

        /* ტელემეტრიის პანელი */
        .sidebar {
            position: absolute; top: 20px; left: 20px; width: 260px;
            background: rgba(15, 15, 15, 0.85); backdrop-filter: blur(20px);
            border-radius: 20px; border: 1px solid rgba(255,255,255,0.1); z-index: 10;
            padding: 30px 20px; display: flex; flex-direction: column; gap: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }
        .header-status { text-align: center; color: #888; font-size: 11px; letter-spacing: 2px; }
        .status-dot { height: 10px; width: 10px; background: #00ffaa; border-radius: 50%; display: inline-block; margin-right: 5px; box-shadow: 0 0 10px #00ffaa;}
        .speed-value { font-size: 80px; font-weight: 300; line-height: 1; text-align: center; }
        .gear-selector { display: flex; justify-content: center; gap: 15px; font-size: 20px; font-weight: bold; color: #444; }
        .gear.active { color: #fff; text-shadow: 0 0 15px rgba(255, 255, 255, 0.8); }
        .battery-icon { width: 100%; height: 12px; border: 1px solid #444; border-radius: 3px; padding: 2px; }
        .battery-level { height: 100%; background: #00ffaa; width: 0%; transition: 0.5s; }

        /* Dock მენიუ */
        .dock-container {
            position: absolute; bottom: 20px; left: 50%; transform: translateX(-50%);
            display: flex; flex-direction: column; align-items: center; gap: 8px; z-index: 1000;
            transition: transform 0.4s cubic-bezier(0.4, 0, 0.2, 1);
        }
        .dock-container.collapsed { transform: translate(-50%, 80px); }
        .dock-toggle {
            width: 50px; height: 18px; background: rgba(30, 30, 30, 0.8); border-radius: 10px;
            display: flex; justify-content: center; align-items: center; cursor: pointer;
            border: 1px solid rgba(255,255,255,0.15); color: #aaa; font-size: 10px;
        }
        .dock {
            background: rgba(20, 20, 20, 0.95); backdrop-filter: blur(20px); padding: 8px 15px;
            border-radius: 40px; display: flex; gap: 15px; border: 1px solid rgba(255,255,255,0.1);
        }
        .dock-icon {
            width: 40px; height: 40px; border-radius: 12px; background: #222; 
            display: flex; justify-content: center; align-items: center; 
            font-size: 20px; cursor: pointer; transition: 0.2s; border: 1px solid transparent;
        }
        .dock-icon.active { border-color: #00ffaa; box-shadow: 0 0 15px rgba(0, 255, 170, 0.2); }

        /* აპლიკაციების ფანჯრები */
        .app-window {
            position: absolute; top: 50px; left: 300px; width: 450px; height: auto;
            background: rgba(20, 20, 20, 0.98); backdrop-filter: blur(30px); border-radius: 24px;
            border: 1px solid rgba(255,255,255,0.1); z-index: 500;
            display: none; flex-direction: column; box-shadow: 0 30px 60px rgba(0,0,0,0.8);
            resize: both; overflow: hidden;
        }
        .app-window.active { display: flex; }
        .app-header { display: flex; justify-content: space-between; align-items: center; padding: 15px 20px; cursor: move; border-bottom: 1px solid rgba(255,255,255,0.05); }
        .app-title { font-size: 14px; color: #888; font-weight: 600; text-transform: uppercase; letter-spacing: 1px; }
        .win-btn { width: 30px; height: 30px; border-radius: 50%; border: none; background: rgba(255,255,255,0.05); color: #fff; cursor: pointer; font-size: 16px; display: flex; align-items: center; justify-content: center; }
        .win-btn:hover { background: rgba(255,255,255,0.1); }
        .win-btn.close:hover { background: #ff4757; }

        .app-content { padding: 20px; flex: 1; display: flex; flex-direction: column; }

        /* YouTube Music Style Search */
        .search-bar { display: flex; background: #111; border-radius: 12px; padding: 5px; gap: 5px; margin-bottom: 15px; border: 1px solid #333; }
        .search-bar input { flex: 1; background: transparent; border: none; color: #fff; padding: 10px; outline: none; font-size: 14px; }
        .search-bar button { background: #ff0000; border: none; color: #fff; padding: 0 15px; border-radius: 8px; cursor: pointer; font-weight: bold; transition: 0.2s; }
        .search-bar button:hover { background: #cc0000; }

        .video-container { width: 100%; aspect-ratio: 16/9; background: #000; border-radius: 12px; overflow: hidden; }

        /* მინი-პლეერი კონტროლებით */
        .mini-player {
            position: absolute; bottom: 100px; left: 50%; transform: translateX(-50%);
            width: 340px; background: rgba(25, 25, 25, 0.95); backdrop-filter: blur(20px);
            border-radius: 20px; border: 1px solid rgba(0, 255, 170, 0.3);
            display: none; flex-direction: column; padding: 12px 15px; gap: 10px;
            box-shadow: 0 15px 40px rgba(0,0,0,0.6); z-index: 900;
        }
        .mini-player.visible { display: flex; }
        .mini-track-info { display: flex; align-items: center; gap: 10px; cursor: pointer; }
        .mini-title { font-size: 13px; font-weight: bold; color: #00ffaa; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; flex: 1; }
        .mini-controls { display: flex; justify-content: center; align-items: center; gap: 20px; }
        .ctrl-btn { background: none; border: none; color: #fff; font-size: 20px; cursor: pointer; transition: 0.2s; }
        .ctrl-btn:hover { color: #00ffaa; transform: scale(1.1); }
        .play-pause { font-size: 28px; color: #00ffaa; }

        /* ნავიგაციის სტილი */
        .suggestions-list { list-style: none; padding: 0; margin: 10px 0; background: #111; border-radius: 10px; overflow: hidden; display: none; }
        .suggestions-list li { padding: 12px; border-bottom: 1px solid #222; cursor: pointer; font-size: 13px; }
        .suggestions-list li:hover { background: #00a8ff; }
    </style>
</head>
<body>

    <div id="map"></div>

    <!-- ტელემეტრია -->
    <div class="sidebar">
        <div class="header-status"><span class="status-dot"></span> MODEL Y ACTIVE</div>
        <div class="speed-value" id="speed">0</div>
        <div style="text-align: center; font-size: 12px; color: #666; margin-top: -10px;">km/h</div>
        <div class="gear-selector">
            <span id="gear-P" class="gear active">P</span>
            <span id="gear-R" class="gear">R</span>
            <span id="gear-N" class="gear">N</span>
            <span id="gear-D" class="gear">D</span>
        </div>
        <div class="battery-icon"><div class="battery-level" id="battery-level"></div></div>
    </div>

    <!-- მინი პლეერი -->
    <div class="mini-player" id="mini-player">
        <div class="mini-track-info" onclick="restoreBrowser()">
            <span style="font-size: 20px;">🎵</span>
            <div class="mini-title" id="mini-title">მუსიკა არ არის ჩართული</div>
            <span style="font-size: 12px; color: #444;">▲</span>
        </div>
        <div class="mini-controls">
            <button class="ctrl-btn" onclick="mediaControl('prev')">⏮</button>
            <button class="ctrl-btn play-pause" id="mini-play-btn" onclick="mediaControl('toggle')">▶</button>
            <button class="ctrl-btn" onclick="mediaControl('next')">⏭</button>
        </div>
    </div>

    <!-- Dock მენიუ -->
    <div class="dock-container" id="dock-container">
        <div class="dock-toggle" id="dock-toggle">▼</div>
        <div class="dock">
            <div class="dock-icon" title="მანქანა">🚗</div>
            <div class="dock-icon" id="dock-nav" title="ნავიგაცია">🧭</div>
            <div class="dock-icon" id="dock-traffic" title="საცობები">🚦</div>
            <div class="dock-icon" id="dock-browser" title="YouTube Music">🎵</div>
            <div class="dock-icon" title="პარამეტრები">⚙️</div>
        </div>
    </div>

    <!-- ნავიგაციის ფანჯარა -->
    <div class="app-window" id="app-nav">
        <div class="app-header">
            <h3 class="app-title">🧭 ნავიგაცია</h3>
            <button class="win-btn close" onclick="toggleApp('app-nav')">&times;</button>
        </div>
        <div class="app-content">
            <div class="search-bar" style="background: #111;">
                <input type="text" id="search-input" placeholder="შეიყვანეთ მისამართი..." autocomplete="off">
            </div>
            <ul id="suggestions" class="suggestions-list"></ul>
            <div id="route-info" style="display:none; justify-content:space-around; background:#111; padding:15px; border-radius:15px; margin-top:10px;">
                <div style="text-align:center;"><div style="font-size:22px; color:#00ffaa;" id="eta-time">--</div><div style="font-size:10px; color:#666;">წთ</div></div>
                <div style="text-align:center;"><div style="font-size:22px; color:#00ffaa;" id="eta-dist">--</div><div style="font-size:10px; color:#666;">კმ</div></div>
            </div>
        </div>
    </div>

    <!-- მედია ფანჯარა -->
    <div class="app-window" id="app-browser">
        <div class="app-header">
            <h3 class="app-title">🎵 YouTube Music</h3>
            <div style="display: flex; gap: 8px;">
                <button class="win-btn" onclick="collapseToMini()" title="ჩაკეცვა">_</button>
                <button class="win-btn close" onclick="toggleApp('app-browser')">&times;</button>
            </div>
        </div>
        <div class="app-content">
            <div class="search-bar">
                <input type="text" id="yt-search" placeholder="მოძებნეთ სიმღერა ან მომღერალი...">
                <button onclick="loadYouTube()">ძიება</button>
            </div>
            <div class="video-container" id="player-wrapper">
                <div id="yt-player"></div>
            </div>
            <p style="font-size: 11px; color: #555; margin-top: 10px; text-align: center;">
                * ძიებისას ავტომატურად შეიქმნება სიმღერების რიგი.
            </p>
        </div>
    </div>

    <!-- YouTube IFrame API -->
    <script src="https://www.youtube.com/iframe_api"></script>

    <script>
        // --- YouTube Player-ის ლოგიკა ---
        let player;
        let isPlaying = false;

        function onYouTubeIframeAPIReady() {
            player = new YT.Player('yt-player', {
                height: '100%',
                width: '100%',
                videoId: 'jfKfPfyJRdk', // Lofi Default
                playerVars: { 
                    'autoplay': 0, 
                    'controls': 1, 
                    'rel': 0, 
                    'enablejsapi': 1,
                    'origin': window.location.origin
                },
                events: {
                    'onStateChange': onPlayerStateChange
                }
            });
        }

        function onPlayerStateChange(event) {
            const btn = document.getElementById('mini-play-btn');
            if (event.data == YT.PlayerState.PLAYING) {
                isPlaying = true;
                btn.innerText = "⏸";
                updateMiniTitle();
            } else if (event.data == YT.PlayerState.PAUSED || event.data == YT.PlayerState.ENDED) {
                isPlaying = false;
                btn.innerText = "▶";
            }
        }

        function loadYouTube() {
            const input = document.getElementById('yt-search').value.trim();
            if(!input) return;

            // ვამოწმებთ არის თუ არა პირდაპირი ლინკი
            const linkMatch = input.match(/(?:v=|\/)([0-9A-Za-z_-]{11})/);
            
            if(linkMatch) {
                player.loadVideoById(linkMatch[1]);
            } else {
                // თუ ტექსტია - ვტვირთავთ საძიებო სიას (Queue)
                player.loadPlaylist({
                    listType: 'search',
                    list: input,
                    index: 0
                });
            }
            updateMiniTitle();
        }

        // Enter-ზე ძიება
        document.getElementById('yt-search').onkeypress = (e) => { if(e.key === 'Enter') loadYouTube(); };

        function mediaControl(action) {
            if(!player) return;
            try {
                if(action === 'toggle') {
                    isPlaying ? player.pauseVideo() : player.playVideo();
                } else if(action === 'next') {
                    player.nextVideo();
                } else if(action === 'prev') {
                    player.previousVideo();
                }
            } catch(e) { console.log("Media action error:", e); }
        }

        function updateMiniTitle() {
            setTimeout(() => {
                try {
                    const data = player.getVideoData();
                    if(data && data.title) {
                        document.getElementById('mini-title').innerText = data.title;
                    }
                } catch(e) {}
            }, 1000);
        }

        // --- აპლიკაციების მართვა ---
        function toggleApp(id) {
            const win = document.getElementById(id);
            const wasActive = win.style.display === 'flex';
            
            document.querySelectorAll('.app-window').forEach(w => w.style.display = 'none');
            document.querySelectorAll('.dock-icon').forEach(i => i.classList.remove('active'));

            if(!wasActive) {
                win.style.display = 'flex';
                const iconId = 'dock-' + id.split('-')[1];
                document.getElementById(iconId)?.classList.add('active');
                if(id === 'app-browser') document.getElementById('mini-player').classList.remove('visible');
            }
        }

        function collapseToMini() {
            document.getElementById('app-browser').style.display = 'none';
            document.getElementById('dock-browser').classList.remove('active');
            document.getElementById('mini-player').classList.add('visible');
            updateMiniTitle();
        }

        function restoreBrowser() {
            document.getElementById('mini-player').classList.remove('visible');
            toggleApp('app-browser');
        }

        document.getElementById('dock-nav').onclick = () => toggleApp('app-nav');
        document.getElementById('dock-browser').onclick = () => toggleApp('app-browser');

        // --- ფანჯრების გადაადგილება ---
        let activeWin = null, offset = {x:0, y:0};
        document.querySelectorAll('.app-header').forEach(h => {
            h.onmousedown = (e) => {
                activeWin = h.parentElement;
                offset.x = e.clientX - activeWin.offsetLeft;
                offset.y = e.clientY - activeWin.offsetTop;
                document.querySelectorAll('.app-window').forEach(w => w.style.zIndex = 500);
                activeWin.style.zIndex = 1000;
            };
        });
        window.onmousemove = (e) => { if(activeWin) { activeWin.style.left = (e.clientX-offset.x)+'px'; activeWin.style.top = (e.clientY-offset.y)+'px'; } };
        window.onmouseup = () => activeWin = null;

        document.getElementById('dock-toggle').onclick = () => {
            const dc = document.getElementById('dock-container');
            dc.classList.toggle('collapsed');
            document.getElementById('dock-toggle').innerText = dc.classList.contains('collapsed') ? '▲' : '▼';
        };

        // --- რუკა და ტელემეტრია ---
        const map = L.map('map', {zoomControl:false}).setView([41.71, 44.82], 13);
        L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png').addTo(map);

        const fbConfig = { apiKey: "AIzaSyAH3yVbBGrhvzbSx7J1GxNcVsl_ykX_OX0", authDomain: "tesla-telemetry-29fb6.firebaseapp.com", databaseURL: "https://tesla-telemetry-29fb6-default-rtdb.europe-west1.firebasedatabase.app", projectId: "tesla-telemetry-29fb6" };
        firebase.initializeApp(fbConfig);
        firebase.database().ref("5YJYGCEE123456789").on('value', (s) => {
            const d = s.val(); if(!d) return;
            document.getElementById('speed').innerText = d.speed_kmh || 0;
            document.querySelectorAll('.gear').forEach(g => g.classList.remove('active'));
            document.getElementById('gear-'+(d.gear||'P'))?.classList.add('active');
            document.getElementById('battery-level').style.width = (d.battery_soc || 0) + "%";
        });
    </script>
</body>
</html>
