    <style>
        :root { --primary: #00ffaa; --bg: #000; --panel: rgba(15, 15, 15, 0.9); --border: rgba(255, 255, 255, 0.15); }

        #map { position: absolute; top: 0; left: 0; width: 100vw; height: 100vh; z-index: 1; filter: grayscale(0.5) brightness(0.8); }

        /*Sidebar*/
        .sidebar {
            position: absolute; top: 20px; bottom: 100px; left: 20px; width: 260px;
            background: var(--panel); backdrop-filter: blur(25px);
            border-radius: 20px; border: 1px solid var(--border); z-index: 10;

    </style>
</head>
<body>

    <div id="map"></div>

                <div class="battery-level" id="battery-level" style="width: 0%"></div>
            </div>

            <div class="dock-icon" id="dock-traffic">🚦</div>
            <div class="dock-icon" id="dock-music" onclick="openApp('app-music')">🎵</div>
            <div class="dock-icon" id="dock-ai" onclick="openApp('app-ai')">✨</div>
            <div class="dock-icon">⚙️</div>
        </div>
    </div>

    <!-- Mini Player UI -->
    <div id="mini-player">
        <div style="font-size: 20px;">🎵</div>
        <div class="mini-info">
            <div class="mini-title">YouTube Music</div>
            <div style="font-size: 10px; color: #888;">ახლა უკრავს...</div>
        </div>
        <div class="mini-controls">
            <button class="control-btn" onclick="mediaCmd('prev')">⏮</button>
            <button class="control-btn" id="mini-play-pause" onclick="mediaCmd('play')">⏯</button>
            <button class="control-btn" onclick="mediaCmd('next')">⏭</button>

        <button class="win-btn" onclick="openApp('app-music')" style="margin-left: 5px;">▲</button>

    <div class="app-window" id="app-nav">
        <div class="app-header">
            <strong>ნავიგაცია</strong>
            <button class="win-btn" onclick="closeApp('app-nav')">&times;</button>
        </div>
        <div style="padding: 20px;">
            <input type="text" id="search-input" placeholder="სად მივდივართ?" style="width: 100%; background: #222; border: 1px solid #444; color: #fff; padding: 12px; border-radius: 10px; outline: none;">
            <ul id="suggestions" style="list-style: none; padding: 0; margin-top: 10px; background: #111; border-radius: 10px; display: none;"></ul>

                <span id="eta-time" style="font-size: 30px; color: var(--primary); font-weight: bold;">--</span> წთ | 
                <span id="eta-dist" style="font-size: 30px;">--</span> კმ
                <button id="ai-route-btn" style="width: 100%; margin-top: 15px; background: var(--primary); color: #000; border: none; padding: 10px; border-radius: 8px; font-weight: bold; cursor: pointer;">✨ AI მარშრუტის ანალიზი</button>
            </div>
        </div>
    </div>

    <!-- App: Music (YouTube) -->
    <div class="app-window" id="app-music" style="width: 600px; height: 400px;">
        <div class="app-header">
            <strong>YouTube Player</strong>
            <div class="header-controls">
                <button class="win-btn" title="ჩაკეცვა" onclick="minimizeApp('app-music')">_</button>
                <button class="win-btn" title="დახურვა" onclick="closeApp('app-music')">&times;</button>

            <!-- ვიყენებთ YouTube-ის სპეციალურ ემბედს რომელიც საშუალებას გვაძლევს ვმართოთ პლეილისტები -->
            <iframe id="yt-frame" src="https://www.youtube.com/embed/videoseries?list=PL4fG7upis8O_O_4X_FvK_v_4A6K4S_V_U&enablejsapi=1" allow="autoplay; encrypted-media"></iframe>
        </div>
    </div>

    <!-- App: AI Co-Pilot -->
    <div class="app-window" id="app-ai">
        <div class="app-header">
            <strong>AI Co-Pilot ✨</strong>
            <button class="win-btn" onclick="closeApp('app-ai')">&times;</button>
        </div>
        <div class="ai-chat-box" id="ai-chat-box">
            <div class="msg bot">გამარჯობა! მე ვარ თქვენი Tesla ასისტენტი. რით შემიძლია დაგეხმაროთ?</div>
        </div>
        <div style="padding: 15px; display: flex; gap: 8px; border-top: 1px solid var(--border);">
            <button id="mic-btn" style="background: #333; border: none; color: white; padding: 10px; border-radius: 10px; cursor: pointer;">🎤</button>
            <input type="text" id="ai-input" placeholder="ჰკითხეთ AI-ს..." style="flex: 1; background: #222; border: none; color: #fff; padding: 10px; border-radius: 10px; outline: none;">
            <button id="ai-send" style="background: var(--primary); color: #000; border: none; padding: 10px 15px; border-radius: 10px; font-weight: bold; cursor: pointer;">გაგზავნა</button>
        </div>
    </div>

    <script>
        const geminiApiKey = "AIzaSyCiIRonRvsdHUHFIIo43JJ7Gp7Moq1N4ik";

        // --- Window Management ---
        function openApp(id) {
            document.querySelectorAll('.app-window').forEach(w => w.classList.remove('active'));
            document.querySelectorAll('.dock-icon').forEach(i => i.classList.remove('active'));
            document.getElementById(id).classList.add('active');
            if(id === 'app-music') document.getElementById('mini-player').style.display = 'none';
        }
        function closeApp(id) {
            document.getElementById(id).classList.remove('active');
            if(id === 'app-music') document.getElementById('mini-player').style.display = 'none';
        }
        function minimizeApp(id) {
            document.getElementById(id).classList.remove('active');
            if(id === 'app-music') document.getElementById('mini-player').style.display = 'flex';
        }

        // --- YouTube & Media Controls ---
        const ytFrame = document.getElementById('yt-frame');
        function mediaCmd(cmd) {
            const msg = { "event": "command", "func": "" };
            if(cmd === 'play') msg.func = "playVideo";
            if(cmd === 'pause') msg.func = "pauseVideo";
            if(cmd === 'next') msg.func = "nextVideo";
            if(cmd === 'prev') msg.func = "previousVideo";
            
            // YouTube Iframe API Control
            ytFrame.contentWindow.postMessage(JSON.stringify(msg), '*');
            
            if(cmd === 'play') {
                document.getElementById('mini-play-pause').innerHTML = "⏸";
                document.getElementById('mini-play-pause').onclick = () => mediaCmd('pause');
            } else if(cmd === 'pause') {
                document.getElementById('mini-play-pause').innerHTML = "▶️";
                document.getElementById('mini-play-pause').onclick = () => mediaCmd('play');
            }
        }

        // --- AI (Gemini 2.5) ---
        async function askGemini(prompt) {
            const url = `https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash-preview-09-2025:generateContent?key=${geminiApiKey}`;
            const sys = "თქვენ ხართ Tesla-ს ასისტენტი. უპასუხეთ ქართულად, მეგობრულად და მოკლედ. ნუ გაიმეორებთ ბატარეას და სიჩქარეს თუ პირდაპირ არ გკითხავენ.";
            
            try {
                const response = await fetch(url, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        contents: [{ parts: [{ text: prompt }] }],
                        systemInstruction: { parts: [{ text: sys }] }
                    })
                });
                const data = await response.json();
                return data.candidates[0].content.parts[0].text;
            } catch (e) { return "ხარვეზი AI სერვერთან: " + e.message; }
        }

        const chat = document.getElementById('ai-chat-box');
        const input = document.getElementById('ai-input');
        
        async function sendMessage() {
            const text = input.value.trim();
            if(!text) return;
            chat.innerHTML += `<div class="msg user">${text}</div>`;
            input.value = "";
            chat.scrollTop = chat.scrollHeight;
            
            const botMsgId = 'bot-' + Date.now();
            chat.innerHTML += `<div class="msg bot" id="${botMsgId}">AI ფიქრობს...</div>`;
            
            const battery = document.getElementById('battery').innerText;
            const speed = document.getElementById('speed').innerText;
            const response = await askGemini(`[Telemetry: Bat ${battery}%, Spd ${speed}km/h] User: ${text}`);
            
            document.getElementById(botMsgId).innerText = response;
            chat.scrollTop = chat.scrollHeight;
            speak(response);
        }

        document.getElementById('ai-send').onclick = sendMessage;
        input.onkeydown = (e) => { if(e.key === 'Enter') sendMessage(); };

        // TTS & STT
        async function speak(text) {
            const url = `https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash-preview-tts:generateContent?key=${geminiApiKey}`;
            try {
                const res = await fetch(url, {
                    method: 'POST', headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({ contents: [{ parts: [{ text: text }] }], generationConfig: { responseModalities: ["AUDIO"], speechConfig: { voiceConfig: { prebuiltVoiceConfig: { voiceName: "Aoede" } } } }, model: "gemini-2.5-flash-preview-tts" })
                });
                const d = await res.json();
                const b64 = d.candidates[0].content.parts[0].inlineData.data;
                const audio = new Audio("data:audio/wav;base64," + b64); // Note: Simplified base64 usage, for PCM16 you usually need a header converter but let's see if this works directly in browser audio
                audio.play();
            } catch(e) {}
        }

        const micBtn = document.getElementById('mic-btn');
        if('webkitSpeechRecognition' in window) {
            const rec = new webkitSpeechRecognition();
            rec.lang = 'ka-GE';
            rec.onresult = (e) => { input.value = e.results[0][0].transcript; sendMessage(); };
            micBtn.onclick = () => rec.start();
        }

        // --- Map & Traffic ---
        const map = L.map('map', {zoomControl: false}).setView([41.7151, 44.8271], 13);
        L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png').addTo(map);
        const trafficLayer = L.tileLayer('https://mt0.google.com/vt/lyrs=h,traffic&x={x}&y={y}&z={z}', {opacity: 0.8});
        let traffic = false;
        document.getElementById('dock-traffic').onclick = function() {
            traffic ? map.removeLayer(trafficLayer) : trafficLayer.addTo(map);
            this.classList.toggle('active'); traffic = !traffic;
        };

        // --- Firebase ---
        const fb = { apiKey: "AIzaSyAH3yVbBGrhvzbSx7J1GxNcVsl_ykX_OX0", authDomain: "tesla-telemetry-29fb6.firebaseapp.com", databaseURL: "https://tesla-telemetry-29fb6-default-rtdb.europe-west1.firebasedatabase.app", projectId: "tesla-telemetry-29fb6" };
        firebase.initializeApp(fb);
        let carMarker = L.marker([41.7151, 44.8271], {icon: L.divIcon({html: '🚗', className: '', iconSize:[40,40]})}).addTo(map);
        
        firebase.database().ref("5YJYGCEE123456789").on('value', (s) => {
            const d = s.val(); if(!d) return;
            document.getElementById('speed').innerText = d.speed_kmh || 0;
            document.getElementById('battery').innerText = d.battery_soc || 0;
            document.getElementById('battery-level').style.width = (d.battery_soc || 0) + "%";
            document.querySelectorAll('.gear').forEach(g => g.classList.remove('active'));
            document.getElementById('gear-' + (d.gear || 'P')).classList.add('active');
            if(d.lat) { carMarker.setLatLng([d.lat, d.lng]); map.panTo([d.lat, d.lng]); }
        });

    </script>
</body>
